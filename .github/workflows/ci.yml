# purpose: CI for HybridOps Ansible collection (lint + build sanity).
# adr: ADR-0606-ansible-collections-release-process
# maintainer: HybridOps.Studio

name: hybridops.network CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: collection-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          pip install pre-commit

      - name: Run pre-commit
        run: |
          pre-commit run --all-files

      - name: Run ansible-lint
        run: |
          ansible-lint -c .config/linters/ansible-lint.yml

      - name: Build collection (sanity)
        run: |
          ansible-galaxy collection build
