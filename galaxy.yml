# purpose: Ansible Galaxy metadata for hybridops.network collection
# adr: ADR-0606-ansible-collections-release-process
# maintainer: HybridOps.Studio

namespace: hybridops
name: network
version: 0.1.0

readme: README.md
description: >
  Network automation roles for HybridOps.Studio: baseline configuration, routing, VLANs, NTP, backups, and lightweight compliance checks for lab and brownfield networks.

authors:
- HybridOps.Studio

license:
- MIT-0

min_ansible_version: "2.15"

tags:
- hybridops
- network
- automation
- routing
- bgp
- ospf
- vlan
- ntp
- backup
- compliance

homepage: https://docs.hybridops.studio
documentation: https://docs.hybridops.studio
repository: https://github.com/hybridops-studio/ansible-collection-network
issues: https://github.com/hybridops-studio/ansible-collection-network/issues

dependencies:
  hybridops.common: ">=0.1.0"
  hybridops.helper: ">=0.1.0"

build_ignore:
- .git
- .github
- .tox
- .venv
- build
- dist
- output
- tests/output
- __pycache__
- .mypy_cache
- .pytest_cache
