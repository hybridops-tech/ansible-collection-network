# purpose: Ansible Galaxy metadata for hybridops.network collection
# adr: ADR-0606-ansible-collections-release-process
# maintainer: HybridOps.Tech

namespace: hybridops
name: network
version: 0.2.0

readme: README.md
description: >
  Legacy Linux WAN simulation and validation roles for HybridOps maintainers,
  focused on strongSwan, FRR, and repeatable three-node WAN lab paths.

authors:
  - HybridOps.Tech

license:
  - MIT-0

tags:
  - hybridops
  - networking
  - linux
  - wan
  - ipsec
  - strongswan
  - frr
  - validation
  - routing
  - bgp

homepage: https://hybridops.tech
documentation: https://docs.hybridops.tech
repository: https://github.com/hybridops-tech/ansible-collection-network
issues: https://github.com/hybridops-tech/ansible-collection-network/issues

dependencies:
  ansible.posix: ">=1.5.4"
  ansible.utils: ">=3.0.0"

build_ignore:
  - .ansible
  - .git
  - .github
  - .tox
  - .venv
  - build
  - dist
  - output
  - tests/output
  - __pycache__
  - .mypy_cache
  - .pytest_cache
